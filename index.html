<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirPods Max Slider UI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
 <section class="slider-main">
    <div class="container">
        <div class="logo">
            <a href="#">
                <img src="https://www.yudiz.com/codepen/headphone-slider/logo.svg" alt="Brand logo">
            </a>
        </div>

        <div class="slider-content-wrap">                
            <div class="slider-content">
                <h2 class="heading-style-2">
                    Apple AirPods Max Wireless Over-Ear Headphones
                </h2>

                <p>
                    Active Noise Cancelling, Transparency Mode, Spatial Audio, Digital Crown for Volume Control. Bluetooth headphones for iPhone.
                </p>

                <h3 class="heading-style-2">$779.99</h3>

                <div class="social-icons">
                    <a href="#"><img src="https://www.yudiz.com/codepen/headphone-slider/instagram-icon.svg" alt="Instagram"></a>
                    <a href="#"><img src="https://www.yudiz.com/codepen/headphone-slider/facbook-icon.svg" alt="Facebook"></a>
                    <a href="#"><img src="https://www.yudiz.com/codepen/headphone-slider/twiter-icon.svg" alt="Twitter"></a>
                </div>
            </div>               
        </div>         
    </div>

    <div class="slider-images">       
        <img class="slider-image" src="https://www.yudiz.com/codepen/headphone-slider/green.png" alt="Green AirPods Max">        
        <img class="slider-image" src="https://www.yudiz.com/codepen/headphone-slider/blue.png" alt="Blue AirPods Max">        
        <img class="slider-image" src="https://www.yudiz.com/codepen/headphone-slider/red.png" alt="Red AirPods Max">        
        <img class="slider-image" src="https://www.yudiz.com/codepen/headphone-slider/white.png" alt="White AirPods Max">        
        <img class="slider-image" src="https://www.yudiz.com/codepen/headphone-slider/black.png" alt="Black AirPods Max">        
    </div> 

    <div id="backgrounds">
        <div class="background" style="background: radial-gradient(circle, #C7F6D0, #7CB686);"></div>
        <div class="background" style="background: radial-gradient(circle, #D1E4F6, #5F9CCF);"></div>
        <div class="background" style="background: radial-gradient(circle, #FFB7B2, #ED746E);"></div>
        <div class="background" style="background: radial-gradient(circle, #D7D7D7, #979797);"></div>
        <div class="background" style="background: radial-gradient(circle, #6B6B6B, #292929);"></div>
    </div>

</section>

<footer class="footer">
    <p>
        Built by <strong>Adebisi Samuel</strong> |
        <a href="https://linkedin.com/in/adebisisamuel" target="_blank">
            Connect on LinkedIn
        </a>
    </p>
</footer>
<script src="main.js"></script>

</body>
</html>
